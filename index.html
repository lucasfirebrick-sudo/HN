              <h1 class="max-w-4xl text-4xl font-semibold leading-tight tracking-tight text-slate-950 md:text-6xl">${t.heroTitle}</h1>
              <p class="mt-6 max-w-2xl text-lg leading-8 text-slate-700 md:text-xl">${t.heroSubtitle}</p>
              <p class="mt-5 max-w-2xl text-base leading-7 text-slate-600 md:text-lg">${t.heroBody}</p>
              <div class="mt-10 flex flex-col gap-4 sm:flex-row">
                <a href="#contact" class="inline-flex items-center justify-center rounded-2xl bg-slate-900 px-6 py-4 text-sm font-semibold text-white shadow-lg shadow-slate-900/15 transition hover:-translate-y-0.5 hover:bg-slate-800">${t.heroButtons[0]}</a>
                <a href="#how-it-works" class="inline-flex items-center justify-center rounded-2xl border border-slate-300 bg-white px-6 py-4 text-sm font-semibold text-slate-900 transition hover:-translate-y-0.5 hover:border-slate-400">${t.heroButtons[1]}</a>
              </div>
              <div class="mt-10 flex flex-wrap gap-3 text-sm text-slate-600">
                ${t.heroTags.map(item => `<span class="rounded-full border border-slate-300 bg-white px-4 py-2">${item}</span>`).join('')}
              </div>
            </div>
            <div class="lg:pl-6">
              <div class="rounded-[28px] border border-slate-200 bg-white p-6 shadow-[0_20px_60px_rgba(15,23,42,0.08)]">
                <div class="mb-5 flex items-center justify-between">
                  <div>
                    <p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">${t.snapshotTitle}</p>
                    <h2 class="mt-2 text-2xl font-semibold text-slate-950">${t.snapshotHeading}</h2>
                  </div>
                  <div class="rounded-2xl bg-amber-50 px-3 py-2 text-xs font-semibold text-amber-700">${t.snapshotFlag}</div>
                </div>
                <div class="grid gap-4 sm:grid-cols-2">
                  ${t.snapshotItems.map(([label, value]) => `
                    <div class="rounded-2xl bg-slate-50 p-4">
                      <p class="text-sm text-slate-500">${label}</p>
                      <p class="mt-2 text-lg font-semibold text-slate-900">${value}</p>
                    </div>
                  `).join('')}
                </div>
                <div class="mt-5 rounded-2xl bg-slate-900 p-5 text-white">
                  <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-300">${t.promiseLabel}</p>
                  <p class="mt-3 text-base leading-7 text-slate-100">${t.promiseText}</p>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section id="what-you-get" class="mx-auto max-w-7xl px-6 py-20 lg:px-8">
          ${sectionHeading(t.whatLabel, t.whatHeading, t.whatText)}
          <div class="mt-12 grid gap-6 md:grid-cols-2 xl:grid-cols-4">
            ${t.whatCards.map(([title, body], index) => `
              <div class="rounded-[24px] border border-slate-200 bg-white p-6 shadow-sm transition hover:-translate-y-1 hover:shadow-md">
                <div class="mb-4 flex h-10 w-10 items-center justify-center rounded-2xl bg-slate-900 text-sm font-semibold text-white">0${index + 1}</div>
                <h3 class="text-xl font-semibold text-slate-950">${title}</h3>
                <p class="mt-3 text-base leading-7 text-slate-600">${body}</p>
              </div>
            `).join('')}
          </div>
        </section>

        <section id="how-it-works" class="border-y border-slate-200 bg-white">
          <div class="mx-auto max-w-7xl px-6 py-20 lg:px-8">
            <div class="grid gap-12 lg:grid-cols-[0.9fr_1.1fr]">
              <div>
                ${sectionHeading(t.processLabel, t.processHeading, t.processText)}
                <div class="mt-8 rounded-[24px] bg-slate-900 p-6 text-white shadow-lg shadow-slate-900/10">
                  <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-300">${t.reassuranceLabel}</p>
                  <p class="mt-3 text-base leading-7 text-slate-100">${t.promiseText}</p>
                </div>
              </div>
              <div class="space-y-5">
                ${t.steps.map(([step, title, body]) => `
                  <div class="rounded-[24px] border border-slate-200 bg-stone-50 p-6 shadow-sm">
                    <div class="flex flex-wrap items-center gap-3">
                      <span class="rounded-full bg-slate-900 px-3 py-1 text-xs font-semibold uppercase tracking-[0.18em] text-white">${step}</span>
                      <h3 class="text-2xl font-semibold text-slate-950">${title}</h3>
                    </div>
                    <p class="mt-4 text-base leading-7 text-slate-600">${body}</p>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </section>

        <section id="why-us" class="mx-auto max-w-7xl px-6 py-20 lg:px-8">
          ${sectionHeading(t.whyLabel, t.whyHeading, t.whyText)}
          <div class="mt-12 grid gap-6 md:grid-cols-2 xl:grid-cols-4">
            ${t.whyCards.map(([title, body]) => `
              <div class="rounded-[24px] border border-slate-200 bg-white p-6 shadow-sm">
                <h3 class="text-xl font-semibold text-slate-950">${title}</h3>
                <p class="mt-4 text-base leading-7 text-slate-600">${body}</p>
              </div>
            `).join('')}
          </div>
          <div class="mt-10 rounded-[28px] border border-amber-200 bg-amber-50 p-6 text-amber-900">
            <p class="text-base leading-7">${t.whyClosing}</p>
          </div>
        </section>

        <section id="sample-outputs" class="bg-slate-950 text-white">
          <div class="mx-auto max-w-7xl px-6 py-20 lg:px-8">
            <div class="max-w-4xl">
              <p class="text-sm font-semibold uppercase tracking-[0.18em] text-slate-400">${t.sampleLabel}</p>
              <h2 class="mt-4 text-3xl font-semibold tracking-tight text-white md:text-5xl">${t.sampleHeading}</h2>
              <p class="mt-6 text-lg leading-8 text-slate-300">${t.sampleText}</p>
              <p class="mt-4 text-base leading-7 text-slate-400">${t.sampleSubtext}</p>
            </div>

            <div class="mt-12 rounded-[28px] border border-white/10 bg-white/5 p-6 shadow-2xl shadow-black/10 backdrop-blur-sm">
              <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
                <div>
                  <p class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">${t.sneakPeekLabel}</p>
                  <h3 class="mt-2 max-w-4xl text-2xl font-semibold text-white md:text-3xl">${t.sneakPeekHeading}</h3>
                </div>
                <span class="rounded-full border border-white/15 px-3 py-1 text-xs text-slate-300">${t.illustrative}</span>
              </div>

              <div class="mt-8 grid gap-6 xl:grid-cols-[1.15fr_0.85fr]">
                <div class="rounded-[24px] border border-white/10 bg-black/20 p-6">
                  <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                    <div>
                      <p class="text-sm text-slate-400">${t.reportTitle}</p>
                      <p class="mt-1 text-xl font-semibold text-white">${t.reportSubtitle}</p>
                    </div>
                    <div class="rounded-xl bg-white/10 px-3 py-2 text-xs text-slate-300">${t.reportBlur}</div>
                  </div>

                  <div class="mt-6 grid gap-4 md:grid-cols-4">
                    ${t.reportInsights.map(([title], idx) => `
                      <div class="rounded-2xl border border-white/10 bg-white/5 p-4">
                        <p class="text-xs uppercase tracking-[0.14em] text-slate-400">KPI 0${idx + 1}</p>
                        <p class="mt-2 text-base font-semibold text-white">${title}</p>
                        ${metricBar(widths[idx], colors[idx])}
                      </div>
                    `).join('')}
                  </div>

                  ${sampleChart(lang)}

                  <div class="mt-6 overflow-hidden rounded-[22px] border border-white/10">
                    <div class="grid grid-cols-[1fr_0.7fr_1.2fr] bg-white/10 px-4 py-3 text-sm font-medium text-slate-200">
                      <div>${lang === 'en' ? 'Channel' : '渠道'}</div>
                      <div>${lang === 'en' ? 'Result' : '结果'}</div>
                      <div>${lang === 'en' ? 'Observation' : '观察'}</div>
                    </div>
                    ${channelRows.map((row) => `
                      <div class="grid grid-cols-[1fr_0.7fr_1.2fr] border-t border-white/10 px-4 py-4 text-sm text-slate-300">
                        <div>${row[0]}</div>
                        <div>${row[1]}</div>
                        <div>${row[2]}</div>
                      </div>
                    `).join('')}
                  </div>
                </div>

                <div class="grid gap-4 sm:grid-cols-2 xl:grid-cols-1">
                  ${t.reportInsights.map(([title, body]) => `
                    <div class="rounded-2xl border border-white/10 bg-white/5 p-5">
                      <p class="text-base font-semibold text-white">${title}</p>
                      <p class="mt-3 text-sm leading-6 text-slate-400">${body}</p>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>

            <div class="mt-8 grid gap-6 lg:grid-cols-2">
              <div class="rounded-[28px] border border-white/10 bg-white/5 p-6 shadow-2xl shadow-black/10 backdrop-blur-sm">
                <div class="flex items-center justify-between">
                  <h3 class="text-2xl font-semibold text-white">${t.pilotSummary}</h3>
                  <span class="rounded-full border border-white/15 px-3 py-1 text-xs text-slate-300">${t.illustrativeFormat}</span>
                </div>
                <div class="mt-6 space-y-4 text-sm leading-7 text-slate-300">
                  ${t.pilotSummaryRows.map(([label, value], idx) => `
                    <div class="flex justify-between gap-4 ${idx < t.pilotSummaryRows.length - 1 ? 'border-b border-white/10 pb-3' : ''}">
                      <span>${label}</span>
                      <span class="text-right text-white">${value}</span>
                    </div>
                  `).join('')}
                </div>
              </div>

              <div class="rounded-[28px] border border-white/10 bg-white/5 p-6 shadow-2xl shadow-black/10 backdrop-blur-sm">
                <div class="flex items-center justify-between">
                  <h3 class="text-2xl font-semibold text-white">${t.nextRecommendation}</h3>
                  <span class="rounded-full border border-white/15 px-3 py-1 text-xs text-slate-300">${t.illustrativeFormat}</span>
                </div>
                <div class="mt-6 rounded-2xl bg-emerald-500/10 p-5 ring-1 ring-emerald-400/20">
                  <p class="text-sm text-emerald-200">${t.recommendationLabel}</p>
                  <p class="mt-2 text-xl font-semibold text-white">${t.recommendationTitle}</p>
                  <p class="mt-4 text-base leading-7 text-slate-300">${t.recommendationText}</p>
                </div>
                <div class="mt-5 grid gap-4 sm:grid-cols-2">
                  ${t.salesRows.map(([label, value]) => `
                    <div class="rounded-2xl border border-white/10 bg-black/10 p-4">
                      <p class="text-sm text-slate-400">${label}</p>
                      <p class="mt-3 text-lg font-semibold text-white">${value}</p>
                    </div>
                  `).join('')}
                </div>
              </div>
            </div>

            <div class="mt-10 max-w-3xl text-lg leading-8 text-slate-300">${t.sampleClosing}</div>
          </div>
        </section>

        <section class="mx-auto max-w-7xl px-6 py-20 lg:px-8">
          <div class="grid gap-12 lg:grid-cols-[0.95fr_1.05fr]">
            <div>
              ${sectionHeading(t.faqLabel, t.faqHeading, t.faqText)}
            </div>
            <div class="space-y-4">
              ${t.faqItems.map(([q, a]) => `
                <div class="rounded-[24px] border border-slate-200 bg-white p-6 shadow-sm">
                  <h3 class="text-lg font-semibold text-slate-950">${q}</h3>
                  <p class="mt-3 text-base leading-7 text-slate-600">${a}</p>
                </div>
              `).join('')}
            </div>
          </div>
        </section>

        <section class="mx-auto max-w-7xl px-6 py-20 lg:px-8">
          <div class="grid gap-10 lg:grid-cols-[0.9fr_1.1fr]">
            <div>
              ${sectionHeading(t.hainanLabel, t.hainanHeading)}
            </div>
            <div class="grid gap-5 md:grid-cols-3">
              ${t.hainanCards.map(([title, body]) => `
                <div class="rounded-[24px] border border-slate-200 bg-white p-6 shadow-sm">
                  <h3 class="text-xl font-semibold text-slate-950">${title}</h3>
                  <p class="mt-4 text-base leading-7 text-slate-600">${body}</p>
                </div>
              `).join('')}
            </div>
          </div>
        </section>

        <section id="contact" class="border-t border-slate-200 bg-white">
          <div class="mx-auto max-w-7xl px-6 py-20 lg:px-8">
            <div class="grid gap-12 lg:grid-cols-[0.9fr_1.1fr]">
              <div>
                ${sectionHeading(t.contactLabel, t.contactHeading, t.contactText)}
                <p class="mt-4 text-base leading-7 text-slate-600">${t.contactSubtext}</p>
              </div>

              <div class="grid gap-6 lg:grid-cols-[0.95fr_1.05fr]">
                <div class="rounded-[28px] border border-slate-200 bg-stone-50 p-6 shadow-sm">
                  <p class="text-sm font-semibold uppercase tracking-[0.18em] text-slate-500">${t.wechatLabel}</p>
                  <h3 class="mt-3 text-2xl font-semibold text-slate-950">${t.wechatHeading}</h3>
                  <p class="mt-2 text-base text-slate-600">${t.wechatText}</p>
                  <div class="mt-6 flex justify-center rounded-[24px] border border-slate-200 bg-white p-4 shadow-inner">
                    <div class="flex w-full flex-col items-center gap-3">
                      <div class="w-full rounded-[24px] border border-slate-200 bg-white p-6 text-center shadow-inner">
                        <div class="text-sm font-semibold uppercase tracking-[0.18em] text-slate-500">${lang === 'en' ? 'WeChat ID' : '微信号'}</div>
                        <div class="mt-4 break-all text-2xl font-semibold text-slate-900">${WECHAT_ID}</div>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="space-y-6">
                  <div class="rounded-[28px] border border-slate-200 bg-white p-6 shadow-sm">
                    <p class="text-sm font-semibold uppercase tracking-[0.18em] text-slate-500">${t.directLabel}</p>
                    <div class="mt-5 grid gap-4">
                      ${t.contactItems.map(([label, value]) => `
                        <div class="rounded-2xl bg-slate-50 p-4">
                          <p class="text-sm text-slate-500">${label}</p>
                          <p class="mt-2 text-base font-semibold text-slate-950">${value}</p>
                        </div>
                      `).join('')}
                    </div>
                  </div>

                  <div class="rounded-[28px] border border-amber-200 bg-amber-50 p-6 text-amber-900 shadow-sm">
                    <p class="text-sm font-semibold uppercase tracking-[0.18em]">${t.noteLabel}</p>
                    <p class="mt-3 text-base leading-7">${t.noteText}</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
      `;

      document.documentElement.lang = lang === 'en' ? 'en' : 'zh-CN';
      document.getElementById('btn-en').className = `rounded-full px-3 py-1.5 font-medium ${lang === 'en' ? 'bg-slate-900 text-white' : 'border border-slate-300 text-slate-500'}`;
      document.getElementById('btn-zh').className = `rounded-full px-3 py-1.5 font-medium ${lang === 'zh' ? 'bg-slate-900 text-white' : 'border border-slate-300 text-slate-500'}`;
    }

    document.getElementById('btn-en').addEventListener('click', () => renderPage('en'));
    document.getElementById('btn-zh').addEventListener('click', () => renderPage('zh'));
    renderPage('en');
  </script>
</body>
</html>
